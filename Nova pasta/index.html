<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nós duas 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9aa2, #ffdde1);
    color: #333;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
}

nav a {
    text-decoration: none;
    color: #333;
    font-weight: bold;
}

/* SECTIONS */
section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 20px;
}

/* CARD CENTRAL */
.card {
    background: rgba(255,255,255,0.4);
    padding: 40px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    text-align: center;
    max-width: 500px;
}

/* BOTÃO */
.botao {
    margin-top: 20px;
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: #ff6b81;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* GALERIA */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    width: 90%;
}

.foto {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 20px;
    transition: 0.3s;
}

.foto:hover {
    transform: scale(1.05);
}

/* CARTA */
.carta {
    max-width: 600px;
    background: white;
    padding: 30px;
    border-radius: 20px;
    line-height: 1.6;
}

/* ANIMAÇÃO */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<nav>
    <a href="#inicio">Início</a>
    <a href="#historia">História</a>
    <a href="#fotos">Fotos</a>
    <a href="#carta">Carta</a>
</nav>

<section id="inicio">
    <div class="card fade">
        <h1>💖 Nós duas 💖</h1>
        <p>3 anos de amor ✨</p>
        <button class="botao" onclick="tocarMusica()">▶️ Tocar Música</button>
        <audio id="musica">
            <source src="musica.mp3">
        </audio>
    </div>
</section>

<section id="historia">
    <div class="card fade">
        <h2>Nossa História</h2>
        <p>Escreva aqui o começo de tudo...</p>
    </div>
</section>

<section id="fotos">
    <h2>Nossos Momentos</h2>
    <div class="galeria" id="galeria"></div>
</section>

<section id="carta">
    <div class="carta fade">
        <h2>💌 Para você</h2>
        <p>
        Escreva aqui sua carta especial...
        </p>
    </div>
</section>

<script>
function tocarMusica() {
    document.getElementById("musica").play();
}

/* CARREGAR FOTOS */
const galeria = document.getElementById("galeria");

for (let i = 1; i <= 47; i++) {
    let img = document.createElement("img");
    img.src = `fotos/foto (${i}).jpg`;
    img.className = "foto fade";
    galeria.appendChild(img);
}

/* ANIMAÇÃO AO ROLAR */
function animar() {
    document.querySelectorAll('.fade').forEach(el => {
        let top = el.getBoundingClientRect().top;
        if (top < window.innerHeight - 50) {
            el.classList.add('show');
        }
    });
}

window.addEventListener('scroll', animar);
animar();
</script>

</body>
</html>
